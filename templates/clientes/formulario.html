{% extends 'base.html' %}
{% block title %}{{ accion }} Cliente{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ accion }} <span>Cliente</span></h1>
  <a href="{{ url_for('cliente.listar') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-grid">

      <div class="form-group full-width">
        <label for="nombre">Nombre completo *</label>
        <input type="text" id="nombre" name="nombre" class="form-control"
               placeholder="Carlos Andrés Mendoza"
               value="{{ cliente.nombre if cliente else '' }}" required>
      </div>

      <div class="form-group">
        <label for="documento">Documento *</label>
        <input type="text" id="documento" name="documento" class="form-control"
               placeholder="Cédula o NIT"
               value="{{ cliente.documento if cliente else '' }}" required>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" class="form-control"
               placeholder="3101234567"
               value="{{ cliente.telefono if cliente else '' }}">
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="cliente@correo.com"
               value="{{ cliente.email if cliente else '' }}">
      </div>

      <div class="form-group full-width">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion" class="form-control"
               placeholder="Calle 50 #20-30, Bogotá"
               value="{{ cliente.direccion if cliente else '' }}">
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ accion }} cliente</button>
      <a href="{{ url_for('cliente.listar') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/clientes.js') }}"></script>
{% endblock %}
