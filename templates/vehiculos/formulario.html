{% extends 'base.html' %}
{% block title %}{{ accion }} Vehículo{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ accion }} <span>Motocicleta</span></h1>
  <a href="{{ url_for('vehiculo.listar') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-grid">

      <div class="form-group">
        <label for="marca">Marca *</label>
        <input type="text" id="marca" name="marca" class="form-control"
               placeholder="Ducati, BMW, Kawasaki…"
               value="{{ vehiculo.marca if vehiculo else '' }}" required>
      </div>

      <div class="form-group">
        <label for="modelo">Modelo *</label>
        <input type="text" id="modelo" name="modelo" class="form-control"
               placeholder="Panigale V4, S1000RR…"
               value="{{ vehiculo.modelo if vehiculo else '' }}" required>
      </div>

      <div class="form-group">
        <label for="precio">Precio (COP) *</label>
        <input type="number" id="precio" name="precio" class="form-control"
               placeholder="85000000" min="0" step="1000"
               value="{{ vehiculo.precio if vehiculo else '' }}" required>
        <span id="precio-preview" style="font-size:0.78rem;color:var(--color-primary);margin-top:2px;"></span>
      </div>

      <div class="form-group">
        <label for="cilindraje">Cilindraje (cc) *</label>
        <input type="number" id="cilindraje" name="cilindraje" class="form-control"
               placeholder="1000" min="50"
               value="{{ vehiculo.cilindraje if vehiculo else '' }}" required>
      </div>

      <div class="form-group">
        <label for="color">Color</label>
        <input type="text" id="color" name="color" class="form-control"
               placeholder="Rojo, Negro, Blanco…"
               value="{{ vehiculo.color if vehiculo else '' }}">
      </div>

      <div class="form-group">
        <label for="anio">Año</label>
        <input type="number" id="anio" name="anio" class="form-control"
               placeholder="2024" min="1990" max="2030"
               value="{{ vehiculo.anio if vehiculo else '' }}">
      </div>

      <div class="form-group">
        <label for="estado">Estado *</label>
        <select id="estado" name="estado" class="form-control" required>
          <option value="disponible"
            {% if vehiculo and vehiculo.estado == 'disponible' %}selected{% endif %}>
            Disponible
          </option>
          <option value="vendido"
            {% if vehiculo and vehiculo.estado == 'vendido' %}selected{% endif %}>
            Vendido
          </option>
        </select>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ accion }} motocicleta</button>
      <a href="{{ url_for('vehiculo.listar') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/vehiculos.js') }}"></script>
{% endblock %}
