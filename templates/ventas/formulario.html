{% extends 'base.html' %}
{% block title %}Nueva Venta{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Registrar <span>Venta</span></h1>
  <a href="{{ url_for('venta.listar') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-grid">

      <div class="form-group full-width">
        <label for="id_cliente">Cliente *</label>
        <select id="id_cliente" name="id_cliente" class="form-control" required>
          <option value="">— Seleccione un cliente —</option>
          {% for c in clientes %}
            <option value="{{ c.id }}">{{ c.nombre }} ({{ c.documento }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group full-width">
        <label for="id_vehiculo">Motocicleta disponible *</label>
        <select id="id_vehiculo" name="id_vehiculo" class="form-control" required>
          <option value="">— Seleccione una moto —</option>
          {% for v in vehiculos %}
            <option value="{{ v.id }}" data-precio="{{ v.precio }}">
              {{ v.marca }} {{ v.modelo }} — {{ v.cilindraje }}cc — ${{ "{:,.0f}".format(v.precio) }}
            </option>
          {% endfor %}
        </select>
        <span id="precio-sugerido" style="font-size:0.78rem;color:var(--color-primary);margin-top:2px;"></span>
      </div>

      <div class="form-group">
        <label for="fecha_venta">Fecha de venta *</label>
        <input type="date" id="fecha_venta" name="fecha_venta" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="valor">Valor de venta (COP) *</label>
        <input type="number" id="valor" name="valor" class="form-control"
               placeholder="Precio acordado" min="0" step="1000" required>
      </div>

      <div class="form-group full-width">
        <label for="observacion">Observaciones</label>
        <textarea id="observacion" name="observacion" class="form-control"
                  placeholder="Forma de pago, notas adicionales…"></textarea>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Registrar venta</button>
      <a href="{{ url_for('venta.listar') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/ventas.js') }}"></script>
{% endblock %}
